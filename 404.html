<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | MapMagician</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="/AssetsGIS/mapmagiciansmall.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --light-bg: #f3f4f6;
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-dark);
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.95) 0%, rgba(226, 232, 240, 0.95) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            max-width: 520px;
            text-align: center;
        }
        .card img { width: 80px; height: 80px; margin-bottom: 1.5rem; }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { color: var(--text-light); margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 0.75rem; }
        .links a {
            display: block;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            color: var(--primary-color);
            border: 2px solid #e2e8f0;
            transition: all 0.3s;
        }
        .links a:hover { border-color: var(--primary-color); transform: translateY(-2px); }
        .links a.primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-color: transparent;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/AssetsGIS/mapmagiciansmall.png" alt="MapMagician Logo" width="80" height="80">
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has moved. Here's where you probably want to go:</p>
        <div class="links">
            <a href="/" class="primary">MapMagician Home</a>
            <a href="/maps.html">Open the Development Plan Map</a>
            <a href="/overlayr/">Overlayr — Map Overlay Tool</a>
            <a href="/location-plan-maker/">Location Plan Maker</a>
        </div>
    </div>
</body>
</html>
