<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#008577">
<title>Map Magician — Development Plan Maps for India</title>
<meta name="description" content="Browse Development Plan, Town Planning Scheme and Village maps across India. 7-day passes for high-zoom premium tiles per district.">
<!-- The same source file is published at both / and /index1.html by
     postbuild-copy.js. Canonical points at / (the homepage) so search engines
     consolidate on a single URL. -->
<link rel="canonical" href="https://dpplans.com/">
<link rel="icon" href="AssetsGIS/mapmagiciansmall.png">
<link rel="apple-touch-icon" href="AssetsGIS/mapmagiciansmall.png">

<!-- Preload the hero variant the browser will most likely use, so it races the
     initial HTML parse instead of waiting for layout. The hero now sits as a
     full-viewport background, so on desktop we want the wide variant. -->
<link rel="preload" as="image" type="image/webp"
      href="AssetsGIS/splash-hero-desktop-1280.webp"
      imagesrcset="AssetsGIS/splash-hero-desktop-768.webp 768w, AssetsGIS/splash-hero-desktop-1280.webp 1280w"
      imagesizes="100vw"
      media="(min-width: 768px)">
<link rel="preload" as="image" type="image/webp"
      href="AssetsGIS/splash-hero-mobile-750.webp"
      imagesrcset="AssetsGIS/splash-hero-mobile-390.webp 390w, AssetsGIS/splash-hero-mobile-750.webp 750w, AssetsGIS/splash-hero-mobile-1080.webp 1080w"
      imagesizes="100vw"
      media="(max-width: 767px)">

<!-- Warm the connection to the icon CDN; region cards each request one PNG from here. -->
<link rel="preconnect" href="https://tiles.mapmagician.in" crossorigin>
<!-- Warm the connection to Firebase RTDB so the on-demand menuGIS fetch (triggered
     when the user opens a state) skips DNS+TLS. -->
<link rel="preconnect" href="https://sodium-hour-256110.firebaseio.com" crossorigin>
<link rel="dns-prefetch" href="https://sodium-hour-256110.firebaseio.com">

<!-- LCP preload: Maharashtra is the first state card painted, so its icon is
     the Largest Contentful Paint candidate. Without this preload, Lighthouse
     flagged the image as undiscoverable in initial HTML (it only enters the
     DOM after the menu-states.json fetch + JS render). -->
<link rel="preload" as="image" fetchpriority="high"
      href="https://tiles.mapmagician.in/dpplans/0imagesGIS/maharashtra.png"
      crossorigin>

<style>
:root {
  --brand: #008577;
  --brand-dark: #006e63;
  --bg: #f3f5f6;
  --card: #ffffff;
  --text: #1f2933;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.05);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: var(--text);
  background: #c5d5d2;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

/* ============ HERO: full-viewport fixed background ============
   Sits behind everything so the menu floats on top and the image
   covers 100vw x 100vh at any aspect ratio. Pointer events stay
   enabled so a tap/drag anywhere outside the menu opens the map. */
.hero {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #c5d5d2;
  cursor: pointer;
  overflow: hidden;
  touch-action: manipulation;
}
.hero picture, .hero img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
.hero img {
  object-fit: cover;
  object-position: center;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none; /* clicks bubble to .hero */
}
.hero-gradient {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 160px;
  background: linear-gradient(to top, rgba(0,0,0,.35), transparent);
  pointer-events: none;
}

/* ============ PANEL: floats on top of hero (left col on desktop, top strip on mobile) ============ */
.panel {
  position: fixed;
  top: 0; left: 0;
  width: 360px;
  height: 100vh;
  z-index: 2;
  display: flex;
  flex-direction: column;
  background: var(--card);
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 18px rgba(0,0,0,.08);
  transition: transform 280ms cubic-bezier(.4,0,.2,1), opacity 220ms ease-out;
  will-change: transform;
}
.panel.closing {
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}
.panel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 8px;
}
.panel-back {
  width: 32px; height: 32px;
  border: none; background: transparent;
  font-size: 20px; color: var(--brand-dark);
  cursor: pointer; border-radius: 8px;
  display: none; align-items: center; justify-content: center;
  transition: background 120ms;
}
.panel-back:hover { background: #eef6f4; }
.panel-back.visible { display: flex; }
.panel-logo {
  display: flex; align-items: center; gap: 10px;
  flex: 1; min-width: 0;
}
.panel-logo img { width: 28px; height: 28px; }
.panel-title {
  font-size: 16px; font-weight: 700; margin: 0;
  letter-spacing: -.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.panel-search {
  margin: 6px 16px 10px;
  padding: 10px 14px;
  background: #f3f5f6;
  border: 1px solid transparent;
  border-radius: 10px;
  font: inherit;
  outline: none;
  transition: background 120ms, border-color 120ms;
}
.panel-search:focus {
  background: #fff;
  border-color: var(--brand);
}
.grid {
  flex: 1 1 0;
  min-height: 0; /* let the flex item shrink so overflow-y:auto actually scrolls */
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 14px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-content: start;
  align-items: start; /* prevent cards from stretching to fill auto-row height */
  -webkit-overflow-scrolling: touch;
}
.grid.grid-list {
  /* Village level: one row per village, full-width inside the panel. */
  grid-template-columns: 1fr;
  gap: 6px;
}

/* State / district cards: silhouette on white + centered name (mirrors maps.html
   .region-card). Explicit pixel heights on the image area guarantee the card
   never compresses, regardless of grid stretching or aspect-ratio support. */
.card {
  background: #fff;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 170px; /* 110 image + ~60 body — hard floor so grid never squeezes */
  transition: transform 120ms, box-shadow 120ms, border-color 120ms;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.card:active { transform: scale(.97); }
.card-img {
  width: 100%;
  height: 110px;            /* explicit px height — works without aspect-ratio support */
  object-fit: contain;
  display: block;
  background: #fff;
  padding: 8px;
  flex: 0 0 110px;
}
.card-ph {
  width: 100%;
  height: 110px;
  flex: 0 0 110px;
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f5;
  font-size: 36px; font-weight: 800; color: #B0BEC5;
}
.card-body {
  padding: 6px 8px 10px;
  text-align: center;
  flex: 1 1 auto;
}
.card-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-sub {
  font-size: 10px; color: var(--muted);
  margin-top: 2px;
}

/* Village rows: flat list, no silhouette — mirrors maps.html village rendering
   (line 4820-4828): letter chip on the left, name + coords on the right. */
.row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: #fff;
  border: 1px solid #eee;
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 120ms, background 120ms;
}
.row:hover { border-color: #d1d5db; background: #fafafa; }
.row:active { background: #f3f4f6; }
.row-letter {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: #e8f5e9;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #2E7D32;
  flex-shrink: 0;
}
.row-text { flex: 1; min-width: 0; }
.row-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.row-sub {
  font-size: 10px; color: var(--muted);
  margin-top: 2px;
}

.skel {
  background: #eef0f1;
  border-radius: 10px;
  height: 150px; /* matches a real card's height */
  position: relative;
  overflow: hidden;
}
.skel::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent);
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
.empty {
  grid-column: 1 / -1;
  padding: 40px 12px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

.panel-footer {
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  background: #fff;
  flex-shrink: 0;
}
.panel-footer a {
  color: var(--brand-dark);
  text-decoration: none;
  font-weight: 600;
}
.panel-footer a:hover { text-decoration: underline; }

/* ============ OPEN MAP button: fixed, centered over the visible hero region ============ */
.open-map {
  position: fixed;
  bottom: calc(28px + env(safe-area-inset-bottom));
  /* Desktop default: center over the right portion of the viewport (hero area
     visible past the 360px panel). Recalculated for mobile below. */
  left: calc(50% + 180px);
  transform: translateX(-50%);
  z-index: 3;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 28px;
  border: none;
  border-radius: 999px;
  background: var(--brand);
  color: #fff;
  font: 600 16px/1 inherit;
  letter-spacing: .01em;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(0,133,119,.45), 0 2px 4px rgba(0,0,0,.18);
  transition: transform 120ms, background 120ms, opacity 200ms;
  white-space: nowrap;
}
.open-map:hover { background: var(--brand-dark); transform: translateX(-50%) translateY(-1px); }
.open-map:active { transform: translateX(-50%) translateY(0); }
.open-map .arrow {
  display: inline-block;
  transition: transform 160ms;
}
.open-map:hover .arrow { transform: translateX(3px); }

/* ============ MOBILE LAYOUT — bottom-sheet (app drawer) ============
   Replaces the narrow left rail with a draggable bottom sheet that snaps to
   peek / half / full. The hero map stays fully visible above the sheet so
   users always have spatial context while browsing regions. Drag handle at
   the top, tap-to-cycle or drag-to-snap. JS wires pointer events to compute
   velocity + nearest snap on release. */
@media (max-width: 767px) {
  .panel {
    top: auto;
    left: 0; right: 0;
    width: 100vw;
    height: 92vh;
    border-right: none;
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -2px 24px rgba(0,0,0,.18);
    /* Default snap = half. User explicitly wants the sheet to land here on
       open (matches the position in their screenshot) — not the older peek
       default. JS-added .snap-* classes override transform. */
    transform: translateY(45vh);
    transition: transform 320ms cubic-bezier(.4,0,.2,1);
    touch-action: pan-y;
  }
  .panel.snap-peek { transform: translateY(calc(100% - 96px)); }
  .panel.snap-half { transform: translateY(45vh); }
  .panel.snap-full { transform: translateY(2vh); }
  .panel.dragging  { transition: none; }
  /* Bottom-sheet close animation slides DOWN, overriding the desktop left-slide. */
  .panel.closing   { transform: translateY(100%); opacity: 0; pointer-events: none; }

  /* Top pill: a visual affordance only. Tapping it (or anywhere on the sheet
     handle area) snaps the sheet to full. Closing is exclusively via the X
     button — drag-to-close was removed because accidental brushes against
     the handle while scrolling kept dismissing users out of the menu. */
  .panel-drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 22px;
    padding-top: 4px;
    cursor: pointer;
    touch-action: none;
    flex-shrink: 0;
  }
  .panel-drag-handle::before {
    content: '';
    width: 44px; height: 5px;
    border-radius: 3px;
    background: #cbd5d5;
    transition: background 120ms;
  }
  .panel-drag-handle:active::before { background: var(--brand); }

  /* Grid keeps 2 columns even on phones now that the sheet uses full width. */
  .grid {
    grid-template-columns: 1fr 1fr;
    padding: 6px 12px 16px;
    gap: 10px;
  }
  .card { min-height: 160px; }
  .card-img, .card-ph { height: 100px; flex: 0 0 100px; padding: 6px; }
  .card-body { padding: 5px 6px 8px; }
  .card-name { font-size: 12px; }
  .card-sub { font-size: 10px; }
  .row { padding: 9px 10px; gap: 10px; }
  .row-letter { width: 32px; height: 32px; font-size: 13px; }
  .row-name { font-size: 12px; }
  .row-sub { font-size: 9px; }
  .skel { height: 140px; }
  .panel-header { padding: 6px 14px 4px; }
  .panel-logo img { width: 24px; height: 24px; }
  .panel-title { font-size: 15px; }
  .panel-search {
    margin: 4px 14px 8px;
    padding: 9px 12px;
    font-size: 13px;
  }
  .panel-footer { padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); font-size: 10px; }
  /* Footer takes precious vertical space when peeked; hide it until at least half-open. */
  .panel.snap-peek .panel-footer { display: none; }
  /* Tighten footer at half so 2 full card rows are visible before scroll. */
  .panel.snap-half .panel-footer { display: none; }

  /* Close X visible whenever the sheet is at snap-full. Since the user pulled
     drag-to-close (only the X dismisses), this button is the only escape from
     the menu back to the live map. */
  .panel.snap-full .panel-close { display: flex; }

  /* Open Map centers on the hero above the sheet's peek strip. */
  .open-map {
    left: 50%;
    bottom: calc(118px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    padding: 12px 22px;
    font-size: 14px;
  }
  .open-map:hover { transform: translateX(-50%) translateY(-1px); }
  .open-map:active { transform: translateX(-50%); }

  /* Expand-to-full-width toggle isn't meaningful for a bottom sheet — the
     sheet already has full-width snap via snap-full. Hide the desktop tab. */
  .panel-toggle { display: none; }
  .panel.expanded { width: 100vw; }
  /* Mobile-expanded reuses snap-full's effective layout; close-X still works. */
}

/* ============ EXPAND-TO-FULL-WIDTH ============
   Tab on the panel's right edge: tap to widen the panel to the full viewport
   (mirrors maps.html region-browser layout) and tap again to collapse. */
.panel-toggle {
  position: absolute;
  top: 50%;
  right: -18px;
  transform: translateY(-50%);
  width: 22px;
  height: 56px;
  border: 1px solid var(--border);
  border-left: none;
  background: #fff;
  border-radius: 0 8px 8px 0;
  cursor: pointer;
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--brand-dark);
  font-size: 14px;
  box-shadow: 2px 0 6px rgba(0,0,0,.08);
  padding: 0;
}
.panel-toggle:hover { background: #eef6f4; }
.toggle-arrow { transition: transform 200ms; display: inline-block; line-height: 1; }
.panel.expanded .toggle-arrow { transform: rotate(180deg); }

.panel.expanded {
  width: 100vw;
  transition: width 280ms cubic-bezier(.4,0,.2,1), transform 280ms cubic-bezier(.4,0,.2,1), opacity 220ms ease-out;
}
/* When the panel covers the viewport the toggle tab would protrude past the
   right edge (right:-18px) and be unreachable. Pin it to the viewport edge
   so users can still collapse back to the narrow rail. */
.panel.expanded .panel-toggle {
  position: fixed;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  border-left: 1px solid var(--border);
  border-radius: 8px;
}

/* Close button — only shown when the panel is expanded. Tapping it closes
   the splash and navigates to /maps.html, the user-requested exit. */
.panel-close {
  display: none;
  width: 36px; height: 36px;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  border-radius: 8px;
  align-items: center;
  justify-content: center;
  margin-left: auto;
  flex-shrink: 0;
}
.panel-close:hover { background: #eef6f4; color: var(--brand-dark); }
.panel.expanded .panel-close { display: flex; }
.panel.expanded .grid {
  grid-template-columns: repeat(2, 1fr);
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}
@media (min-width: 600px) {
  .panel.expanded .grid { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 900px) {
  .panel.expanded .grid { grid-template-columns: repeat(4, 1fr); }
}
.panel.expanded.grid-village-active .grid { grid-template-columns: 1fr; max-width: 720px; }
/* hide the floating Open Map button when the panel covers the viewport */
.panel.expanded ~ .open-map { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<!-- Hero is BEHIND everything; clicks anywhere outside the panel/button open the map. -->
<div class="hero" id="hero" role="button" aria-label="Open the interactive map">
  <picture>
    <source media="(max-width: 767px)" type="image/webp"
            srcset="AssetsGIS/splash-hero-mobile-390.webp 390w, AssetsGIS/splash-hero-mobile-750.webp 750w, AssetsGIS/splash-hero-mobile-1080.webp 1080w"
            sizes="100vw">
    <source media="(max-width: 767px)" type="image/jpeg"
            srcset="AssetsGIS/splash-hero-mobile-390.jpg 390w, AssetsGIS/splash-hero-mobile-750.jpg 750w, AssetsGIS/splash-hero-mobile-1080.jpg 1080w"
            sizes="100vw">
    <source media="(min-width: 768px)" type="image/webp"
            srcset="AssetsGIS/splash-hero-desktop-768.webp 768w, AssetsGIS/splash-hero-desktop-1280.webp 1280w"
            sizes="100vw">
    <source media="(min-width: 768px)" type="image/jpeg"
            srcset="AssetsGIS/splash-hero-desktop-768.jpg 768w, AssetsGIS/splash-hero-desktop-1280.jpg 1280w"
            sizes="100vw">
    <img src="AssetsGIS/splash-hero-desktop-1280.jpg" alt="Live Development Plan map preview" decoding="async" fetchpriority="high">
  </picture>
  <div class="hero-gradient"></div>
</div>

<aside class="panel" id="panel">
  <div class="panel-header">
    <button class="panel-back" id="back" aria-label="Back" type="button">&larr;</button>
    <div class="panel-logo">
      <img src="AssetsGIS/mapmagiciansmall.webp" alt="" width="28" height="28" decoding="async">
      <h1 class="panel-title" id="title">Browse Regions</h1>
    </div>
    <button class="panel-close" id="panel-close" type="button" aria-label="Close menu and open map">&times;</button>
  </div>
  <input class="panel-search" id="search" type="search" placeholder="Search states or districts..." autocomplete="off" enterkeyhint="search">
  <div class="grid" id="grid">
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
  </div>
  <footer class="panel-footer">
    Powered by <a href="https://www.mapmagician.in/" rel="noopener">MapMagician</a>
  </footer>
  <button class="panel-toggle" id="toggle-width" type="button" aria-label="Expand panel" aria-expanded="false">
    <span class="toggle-arrow" aria-hidden="true">&#x276F;</span>
  </button>
</aside>

<button class="open-map" id="open-map" type="button">
  Open Map <span class="arrow" aria-hidden="true">&rarr;</span>
</button>

<script>
(function () {
  'use strict';

  var MENU_URL = 'https://sodium-hour-256110.firebaseio.com/menuGIS.json';
  var STATES_URL = '/data/menu-states.json';
  var SEO_INDEX_URL = '/data/seo-index.json';
  var ICON_BASE = 'https://tiles.mapmagician.in/dpplans/0imagesGIS/';
  var MAP_URL = '/maps.html';

  // localStorage cache keys + TTLs. Cache-first / revalidate-in-background
  // pattern shaves the JSON.parse blocking time off TBT on repeat visits.
  var MENU_CACHE_KEY = 'mm_menuGIS_v1';
  var STATES_CACHE_KEY = 'mm_menuStates_v1';
  var SEO_CACHE_KEY = 'mm_seoIndex_v1';
  var MENU_TTL_MS = 24 * 60 * 60 * 1000;    // 24h — menuGIS changes daily-ish
  var STATES_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7d — state list barely changes
  var SEO_TTL_MS = 7 * 24 * 60 * 60 * 1000;   // 7d — SEO slugs change rarely

  var $ = function (id) { return document.getElementById(id); };
  var panel = $('panel'), grid = $('grid'), title = $('title'),
      back = $('back'), search = $('search'),
      hero = $('hero'), openBtn = $('open-map'),
      toggleBtn = $('toggle-width');

  // Animate panel off-screen, then navigate. 280ms matches the CSS transition
  // so the slide completes before the new page replaces this one.
  var navigating = false;
  function navigateTo(url) {
    if (navigating) return;
    navigating = true;
    panel.classList.add('closing');
    openBtn.style.opacity = '0';
    setTimeout(function () { window.location.href = url; }, 280);
  }
  function goToMap(extraQuery) {
    navigateTo(MAP_URL + (extraQuery ? '?' + extraQuery : ''));
  }

  // Browser back from /maps.html restores this page from the bfcache with the
  // pre-navigation state intact: panel is still .closing (translateX -100%)
  // and navigating=true blocks every interaction. Reset on pageshow so the
  // splash is usable again.
  window.addEventListener('pageshow', function (e) {
    if (!e.persisted) return;
    navigating = false;
    panel.classList.remove('closing');
    openBtn.style.opacity = '';
  });

  // Hero interactions: real tap, OR drag past a small threshold.
  // pointerdown alone would fire on scroll-start; we wait for pointerup (tap)
  // or genuine pointermove. pointercancel clears intent.
  var pdown = null;
  hero.addEventListener('pointerdown', function (e) {
    pdown = { x: e.clientX, y: e.clientY, fired: false };
  });
  hero.addEventListener('pointermove', function (e) {
    if (!pdown || pdown.fired) return;
    var dx = e.clientX - pdown.x, dy = e.clientY - pdown.y;
    if (dx * dx + dy * dy > 100) { // ~10px
      pdown.fired = true;
      goToMap();
    }
  });
  hero.addEventListener('pointerup', function () {
    if (pdown && !pdown.fired) goToMap();
    pdown = null;
  });
  hero.addEventListener('pointercancel', function () { pdown = null; });

  openBtn.addEventListener('click', function (e) { e.stopPropagation(); goToMap(); });

  // Region browser: full 3-level drill — state -> district -> village. Mirrors
  // maps.html's openRegionsBrowser/openStateInBrowser/openDistrictVillages so
  // every entry visible there is also visible here.
  var data = null;
  var byState = null;       // { stateName: [entry, ...] }, insertion-ordered
  var stateOrder = null;    // [stateName, ...] in first-seen order (matches maps.html)
  // historyStack lets the Back button rewind state -> district -> village.
  var historyStack = []; // [{ level, title, items, parent? }]

  // SEO routing lookup populated by fetchSEOIndex(). Each entry maps the
  // menuGIS productPurchaseID for a district to { slug, villages }, where
  // villages is a lowercase-name -> village slug map. Districts/villages
  // not present here fall through to /maps.html with deep-link params.
  var seoByPid = {};

  function countVillages(villagesJSON) {
    if (!villagesJSON) return 0;
    var c = 0;
    var lines = villagesJSON.split('\n');
    for (var i = 0; i < lines.length; i++) if (lines[i].indexOf('=') > -1) c++;
    return c;
  }

  function parseVillagesJSON(villagesJSON) {
    if (!villagesJSON) return [];
    var out = [];
    villagesJSON.split('\n').forEach(function (line) {
      var eq = line.indexOf('=');
      if (eq <= 0) return;
      var name = line.substring(0, eq).trim();
      var coords = line.substring(eq + 1).trim().split(',');
      var lat = parseFloat(coords[0]);
      var lng = parseFloat(coords[1]);
      if (!name || isNaN(lat) || isNaN(lng)) return;
      out.push({ name: name, lat: lat, lng: lng });
    });
    return out;
  }

  function readCache(key, ttl) {
    try {
      var raw = localStorage.getItem(key);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (!obj || typeof obj.ts !== 'number' || !obj.data) return null;
      if (Date.now() - obj.ts > ttl) return null;
      return obj.data;
    } catch (e) { return null; }
  }
  function writeCache(key, data) {
    try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data: data })); }
    catch (e) { /* quota exceeded or storage unavailable */ }
  }

  // Build byState / stateOrder from the FULL menuGIS payload. Used once the
  // user actually drills into a state and we need the district + village data.
  function processMenu(json) {
    data = json;
    byState = {};
    stateOrder = [];
    for (var k in json) {
      var e = json[k]; if (!e || !e.state) continue;
      var copy = { _key: k };
      for (var f in e) copy[f] = e[f];
      if (!byState[e.state]) { byState[e.state] = []; stateOrder.push(e.state); }
      byState[e.state].push(copy);
    }
  }

  function fetchMenuFresh(onDone) {
    fetch(MENU_URL, { cache: 'force-cache' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (json) {
        if (!json) { if (onDone) onDone(false); return; }
        writeCache(MENU_CACHE_KEY, json);
        if (onDone) onDone(true, json);
      })
      .catch(function () { if (onDone) onDone(false); });
  }

  // Pending-callbacks queue: openState() may be called BEFORE the full menu
  // arrives. We register the callback and drain the queue on load.
  var menuLoaded = false, menuLoading = false, menuPending = [];
  function ensureMenuLoaded(cb) {
    if (menuLoaded) { if (cb) cb(true); return; }
    if (cb) menuPending.push(cb);
    if (menuLoading) return;
    menuLoading = true;
    var cached = readCache(MENU_CACHE_KEY, MENU_TTL_MS);
    if (cached) {
      processMenu(cached);
      menuLoaded = true;
      drainMenuPending(true);
      // Idle revalidate so a stale-but-readable cache doesn't block UX.
      (window.requestIdleCallback || function (cb2) { return setTimeout(cb2, 3000); })(function () {
        fetchMenuFresh(function (ok, json) {
          if (ok && json && Object.keys(json).length !== Object.keys(data || {}).length) {
            processMenu(json);
          }
        });
      }, { timeout: 6000 });
      return;
    }
    fetchMenuFresh(function (ok, json) {
      if (ok && json) {
        processMenu(json);
        menuLoaded = true;
        drainMenuPending(true);
      } else {
        drainMenuPending(false);
      }
    });
  }
  function drainMenuPending(ok) {
    var q = menuPending; menuPending = [];
    q.forEach(function (cb) { try { cb(ok); } catch (e) {} });
  }

  // Render the state cards from the slim menu-states.json payload alone —
  // no full menuGIS required. This is what makes first paint fast: ~1 KB
  // states file vs the ~167 KB full menu.
  function renderStatesFromSlim(states) {
    historyStack = [];
    // Seed stateOrder so search across the (yet-unloaded) full menu still
    // works on the state-list level. byState stays empty until needed.
    stateOrder = states.map(function (s) { return s.name; });
    var items = states.map(function (s) {
      var sub = '';
      if (s.districtCount) sub = s.districtCount + ' district' + (s.districtCount === 1 ? '' : 's');
      else if (s.locationCount) sub = s.locationCount + ' location' + (s.locationCount === 1 ? '' : 's');
      return { name: s.name, sub: sub, icon: s.icon || '', _kind: 'state' };
    });
    pushLevel({ level: 'state', title: 'Browse Regions', items: items });
  }

  var statesLoaded = false;
  function ensureStatesLoaded() {
    if (statesLoaded) return;
    statesLoaded = true;
    var cached = readCache(STATES_CACHE_KEY, STATES_TTL_MS);
    if (cached && cached.states) {
      renderStatesFromSlim(cached.states);
      // Revalidate in background; states list barely changes so this is rare work.
      (window.requestIdleCallback || function (cb) { return setTimeout(cb, 3000); })(function () {
        fetch(STATES_URL, { cache: 'force-cache' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (json) {
            if (json && json.states && json.states.length !== cached.states.length) {
              writeCache(STATES_CACHE_KEY, json);
              renderStatesFromSlim(json.states);
            }
          })
          .catch(function () {});
      }, { timeout: 6000 });
      return;
    }
    fetch(STATES_URL, { cache: 'force-cache' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (json) {
        if (json && json.states) {
          writeCache(STATES_CACHE_KEY, json);
          renderStatesFromSlim(json.states);
          return;
        }
        // Slim file missing (e.g. local file:// or first deploy before postbuild).
        // Fall back to the full menu fetch — the splash still works, just slower.
        ensureMenuLoaded(function (ok) {
          if (ok) renderStates();
          else showEmpty('Could not load regions. Tap Open Map to continue.');
        });
      })
      .catch(function () {
        ensureMenuLoaded(function (ok) {
          if (ok) renderStates();
          else showEmpty('Could not load regions. Tap Open Map to continue.');
        });
      });
  }

  function processSEO(json) {
    if (!json || !json.regions) return;
    json.regions.forEach(function (r) {
      if (!r.productPurchaseID || !r.slug) return;
      var villages = {};
      (r.villages || []).forEach(function (v) {
        if (v && v.name && v.slug) villages[v.name.toLowerCase()] = v.slug;
      });
      seoByPid[r.productPurchaseID] = { slug: r.slug, villages: villages };
    });
  }
  function ensureSEOLoaded() {
    var cached = readCache(SEO_CACHE_KEY, SEO_TTL_MS);
    if (cached) {
      processSEO(cached);
      return; // skip revalidate — SEO slugs barely change, fresh on next 7d-expiry
    }
    fetch(SEO_INDEX_URL, { cache: 'force-cache' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (json) {
        if (!json) return;
        writeCache(SEO_CACHE_KEY, json);
        processSEO(json);
      })
      .catch(function () { /* SEO unavailable — clicks fall through */ });
  }

  function renderStates() {
    historyStack = [];
    var items = stateOrder.map(function (name) {
      var entries = byState[name];
      var districts = entries.filter(function (e) { return e.district; });
      var icon = (entries[0] && entries[0].iconState) || '';
      var sub;
      if (districts.length > 0) {
        sub = districts.length + ' district' + (districts.length === 1 ? '' : 's');
      } else {
        var v = 0;
        entries.forEach(function (e) { v += countVillages(e.villagesJSON); });
        sub = v ? v + ' location' + (v === 1 ? '' : 's') : '';
      }
      return { name: name, sub: sub, icon: icon, _kind: 'state' };
    });
    pushLevel({ level: 'state', title: 'Browse Regions', items: items });
  }

  function openState(stateName) {
    // Drill-down requires the full menuGIS. On first-state-click after a fresh
    // load, kick off the fetch and replace the grid with skeletons so the user
    // sees something is happening. On warm cache this resolves synchronously
    // inside ensureMenuLoaded and we drop straight through.
    if (!byState || !byState[stateName]) {
      showSkeletons();
      ensureMenuLoaded(function (ok) {
        if (!ok) { showEmpty('Could not load regions. Tap Open Map to continue.'); return; }
        openState(stateName);
      });
      return;
    }
    // Match maps.html openStateInBrowser logic exactly. If a state has districts,
    // show district list. If it's a single state-level entry with villages, jump
    // straight to its villages.
    var entries = byState[stateName] || [];
    var districts = entries.filter(function (e) { return e.district; })
      .sort(function (a, b) { return a.district.localeCompare(b.district); });
    var stateItem = entries.find(function (e) { return !e.district; });

    if (districts.length === 1) {
      // Single district — skip a step and jump to its villages.
      openDistrict(districts[0]);
      return;
    }
    if (districts.length > 1) {
      var items = districts.map(function (d) {
        var locCount = countVillages(d.villagesJSON);
        return {
          name: d.district,
          sub: locCount ? locCount + ' location' + (locCount === 1 ? '' : 's') : '',
          icon: d.iconVillage || d.iconState || '',
          _kind: 'district',
          _entry: d
        };
      });
      pushLevel({ level: 'district', title: stateName, items: items });
      return;
    }
    if (stateItem && stateItem.villagesJSON) {
      openDistrict(stateItem, stateName);
    }
  }

  function openDistrict(entry, overrideTitle) {
    var villages = parseVillagesJSON(entry.villagesJSON);
    if (villages.length === 1) {
      // Single village — go straight to map at that lat/lng.
      goToVillage(villages[0], entry.productPurchaseID);
      return;
    }
    var items = villages.map(function (v) {
      return {
        name: v.name,
        sub: v.lat.toFixed(4) + ', ' + v.lng.toFixed(4),
        icon: '', // villages have no icons; placeholder renders the first letter
        _kind: 'village',
        _lat: v.lat,
        _lng: v.lng,
        _pid: entry.productPurchaseID
      };
    });
    pushLevel({ level: 'village', title: overrideTitle || entry.district || entry.state, items: items });
  }

  function pushLevel(level) {
    historyStack.push(level);
    title.textContent = level.title;
    back.classList.toggle('visible', historyStack.length > 1);
    search.value = '';
    paint(level.items, level.level);
    grid.scrollTop = 0;
  }

  function popLevel() {
    if (historyStack.length <= 1) return;
    historyStack.pop();
    var prev = historyStack[historyStack.length - 1];
    title.textContent = prev.title;
    back.classList.toggle('visible', historyStack.length > 1);
    search.value = '';
    paint(prev.items, prev.level);
    grid.scrollTop = 0;
  }

  function paint(items, level) {
    grid.innerHTML = '';
    // Villages render as a flat single-column list (matches maps-app.js:4815).
    // States and districts render as a 2-col silhouette card grid.
    grid.classList.toggle('grid-list', level === 'village');
    panel.classList.toggle('grid-village-active', level === 'village');
    if (!items.length) { showEmpty('No matches.'); return; }
    var frag = document.createDocumentFragment();
    items.forEach(function (item, i) {
      var c;
      if (level === 'village') {
        c = renderRow(item);
      } else {
        // First card in the state grid is the LCP candidate (matches the
        // preload in <head>). Mark it priority so the browser keeps the
        // hint after the JS-rendered img enters the DOM.
        c = renderCard(item, level === 'state' && i === 0);
      }
      c.addEventListener('click', function () { onCardClick(item); });
      frag.appendChild(c);
    });
    grid.appendChild(frag);
  }

  function renderCard(item, isPriority) {
    var c = document.createElement('div');
    c.className = 'card';
    var firstChar = (item.name.charAt(0) || '?');
    if (item.icon) {
      var img = document.createElement('img');
      img.className = 'card-img';
      // LCP card skips loading=lazy and gets fetchpriority=high so the preload
      // hint actually wins. All other cards stay lazy so the grid doesn't
      // request 40+ icons on render.
      if (isPriority) {
        img.setAttribute('fetchpriority', 'high');
      } else {
        img.loading = 'lazy';
      }
      img.decoding = 'async';
      img.alt = '';
      img.src = ICON_BASE + item.icon + '.png';
      img.onerror = function () {
        var ph = document.createElement('div');
        ph.className = 'card-ph';
        ph.textContent = firstChar;
        this.parentNode.replaceChild(ph, this);
      };
      c.appendChild(img);
    } else {
      var ph = document.createElement('div');
      ph.className = 'card-ph';
      ph.textContent = firstChar;
      c.appendChild(ph);
    }
    var body = document.createElement('div');
    body.className = 'card-body';
    var nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = item.name;
    body.appendChild(nameEl);
    if (item.sub) {
      var subEl = document.createElement('div');
      subEl.className = 'card-sub';
      subEl.textContent = item.sub;
      body.appendChild(subEl);
    }
    c.appendChild(body);
    return c;
  }

  function renderRow(item) {
    var r = document.createElement('div');
    r.className = 'row';
    var letter = document.createElement('div');
    letter.className = 'row-letter';
    letter.textContent = (item.name.charAt(0) || '?');
    var txt = document.createElement('div');
    txt.className = 'row-text';
    var nameEl = document.createElement('div');
    nameEl.className = 'row-name';
    nameEl.textContent = item.name;
    txt.appendChild(nameEl);
    if (item.sub) {
      var subEl = document.createElement('div');
      subEl.className = 'row-sub';
      subEl.textContent = item.sub;
      txt.appendChild(subEl);
    }
    r.appendChild(letter);
    r.appendChild(txt);
    return r;
  }

  function onCardClick(item) {
    // Mobile: any card interaction expands the sheet to full so the drill-down
    // is visible above the fold (otherwise the lower half of the new list is
    // hidden behind the hero). Skip for village taps — they navigate away.
    if (mq.matches && currentSnap !== 'full' && item._kind !== 'village') {
      setSnap('full');
    }
    // Always navigate to the live map — splash drives engagement to
    // /maps.html, not the SEO landing pages. Per-region SEO discovery
    // happens via crawlable links elsewhere, not via this click handler.
    if (item._kind === 'state') { openState(item.name); return; }
    if (item._kind === 'district') { openDistrict(item._entry); return; }
    if (item._kind === 'village') { goToVillage({ lat: item._lat, lng: item._lng, name: item.name }, item._pid); return; }
  }

  function goToVillage(v, productPurchaseID) {
    // maps-app.js:3877 honors ?lat&lng&zoom for deep-linking. Land at zoom 13:
    // the access check at maps-app.js:4214 fires at z >= MAX_FREE_ZOOM (14)
    // and flashes a "No Map Data" dialog while polygons are still parsing.
    // Zoom 13 keeps the user safely below both the access check and the
    // billing gate (z > 14, maps-app.js:2904) — they see city context and
    // zoom in manually when ready.
    var qs = 'lat=' + v.lat + '&lng=' + v.lng + '&zoom=13';
    if (productPurchaseID) qs += '&pid=' + encodeURIComponent(productPurchaseID);
    goToMap(qs);
  }

  function showEmpty(msg) {
    grid.innerHTML = '';
    var d = document.createElement('div');
    d.className = 'empty';
    d.textContent = msg;
    grid.appendChild(d);
  }

  // Skeleton placeholders shown while the full menu loads after a state click
  // on cold cache. Matches the initial HTML skeletons so the layout doesn't jump.
  function showSkeletons() {
    grid.innerHTML = '';
    grid.classList.remove('grid-list');
    panel.classList.remove('grid-village-active');
    for (var i = 0; i < 6; i++) {
      var s = document.createElement('div');
      s.className = 'skel';
      grid.appendChild(s);
    }
  }

  back.addEventListener('click', popLevel);

  toggleBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    var isExpanded = panel.classList.toggle('expanded');
    toggleBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
    toggleBtn.setAttribute('aria-label', isExpanded ? 'Collapse panel' : 'Expand panel');
  });

  $('panel-close').addEventListener('click', function (e) {
    e.stopPropagation();
    goToMap();
  });

  // ============ Bottom-sheet snap (mobile only) ============
  // Simplified from the earlier drag-to-snap-anywhere implementation:
  //   - Sheet starts at snap-half (the user's preferred resting view).
  //   - ANY interaction with the top handle — tap or drag — snaps to full.
  //   - Closing is X-only. Drag-down-to-close was removed because accidental
  //     brushes against the handle while scrolling kept dismissing users.
  // This trades expressiveness for predictability and zero misfires.
  var mq = window.matchMedia('(max-width: 767px)');
  var dragHandle = null;
  var currentSnap = 'half';
  var snapClasses = ['snap-peek', 'snap-half', 'snap-full'];

  function setSnap(name) {
    snapClasses.forEach(function (c) { panel.classList.remove(c); });
    panel.classList.add('snap-' + name);
    currentSnap = name;
  }

  function wireDragHandle(handle) {
    handle.addEventListener('pointerdown', function (e) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      // Prime the menu load — by the time the snap animation finishes, the
      // network round-trip is already in flight (or done if cache is warm).
      ensureMenuLoaded();
      setSnap('full');
      e.preventDefault();
    }, { passive: false });
  }

  function initBottomSheet() {
    if (!mq.matches) {
      // Crossed back to desktop — drop snap classes so the desktop rules win.
      snapClasses.forEach(function (c) { panel.classList.remove(c); });
      return;
    }
    if (!dragHandle) {
      dragHandle = document.createElement('div');
      dragHandle.className = 'panel-drag-handle';
      dragHandle.id = 'panel-drag-handle';
      dragHandle.setAttribute('role', 'separator');
      dragHandle.setAttribute('aria-label', 'Drag to resize panel');
      panel.insertBefore(dragHandle, panel.firstChild);
      wireDragHandle(dragHandle);
    }
    if (!snapClasses.some(function (c) { return panel.classList.contains(c); })) {
      setSnap('half');
    }
  }
  initBottomSheet();
  if (mq.addEventListener) mq.addEventListener('change', initBottomSheet);
  else if (mq.addListener) mq.addListener(initBottomSheet); // older Safari

  // Tapping into the search bar on mobile expands the sheet to full so the
  // virtual keyboard doesn't push the search input behind the hero crop.
  search.addEventListener('focus', function () {
    if (mq.matches && currentSnap !== 'full') setSnap('full');
    ensureMenuLoaded(); // searching needs the full menu (matches across districts/villages)
  });

  var searchDebounce;
  search.addEventListener('input', function () {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function () {
      var q = search.value.trim().toLowerCase();
      var current = historyStack[historyStack.length - 1];
      if (!current) return;
      if (!q) { paint(current.items, current.level); return; }
      paint(current.items.filter(function (it) { return it.name.toLowerCase().indexOf(q) > -1; }), current.level);
    }, 80);
  });

  // Warm the browser cache for /maps.html so the eventual navigation is
  // near-instant. Idle-scheduled so it never competes with splash paint.
  function prefetchMap() {
    [MAP_URL, '/maps-app.js'].forEach(function (href) {
      var l = document.createElement('link');
      l.rel = 'prefetch';
      l.href = href;
      l.as = href.endsWith('.js') ? 'script' : 'document';
      document.head.appendChild(l);
    });
  }
  (window.requestIdleCallback || function (cb) { return setTimeout(cb, 800); })(prefetchMap, { timeout: 1500 });

  // Register the shared service worker — caches region icons cross-origin
  // (CloudFront tiles.mapmagician.in/dpplans/0imagesGIS/*.png) so the splash
  // grid re-renders instantly on repeat visits and inside the installed PWA.
  // Deferred to idle so the registration (which downloads sw.js and pre-caches
  // SHELL_URLS) never competes with first paint / LCP.
  if ('serviceWorker' in navigator) {
    (window.requestIdleCallback || function (cb) { return setTimeout(cb, 2000); })(function () {
      navigator.serviceWorker.register('/sw.js').catch(function () { /* file:// or unsupported */ });
    }, { timeout: 4000 });
  }

  // FIRST PAINT: fetch only the slim states list (~1 KB). This replaces the
  // earlier full-menu fetch on initial load and removes ~167 KB / ~1.2 s from
  // the critical path. The full menuGIS is fetched lazily — either when the
  // user opens a state (openState calls ensureMenuLoaded) or when they focus
  // the search input (which needs the full payload to search districts /
  // villages). On a warm localStorage cache, ensureStatesLoaded renders
  // synchronously and the only network work is a background revalidate.
  ensureStatesLoaded();
  (window.requestIdleCallback || function (cb) { return setTimeout(cb, 1500); })(ensureSEOLoaded, { timeout: 4000 });
})();
</script>
</body>
</html>
