<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#008577">
<title>Map Magician — Development Plan Maps for India</title>
<meta name="description" content="Browse Development Plan, Town Planning Scheme and Village maps across India. 7-day passes for high-zoom premium tiles per district.">
<link rel="canonical" href="https://dpplans.com/">
<link rel="icon" href="AssetsGIS/mapmagiciansmall.png">
<link rel="apple-touch-icon" href="AssetsGIS/mapmagiciansmall.png">

<!-- Preload the hero variant the browser will most likely use, so it races the
     initial HTML parse instead of waiting for layout. The hero now sits as a
     full-viewport background, so on desktop we want the wide variant. -->
<link rel="preload" as="image" type="image/webp"
      href="AssetsGIS/splash-hero-desktop-1280.webp"
      imagesrcset="AssetsGIS/splash-hero-desktop-768.webp 768w, AssetsGIS/splash-hero-desktop-1280.webp 1280w, AssetsGIS/splash-hero-desktop-1920.webp 1920w"
      imagesizes="100vw"
      media="(min-width: 768px)">
<link rel="preload" as="image" type="image/webp"
      href="AssetsGIS/splash-hero-mobile-750.webp"
      imagesrcset="AssetsGIS/splash-hero-mobile-390.webp 390w, AssetsGIS/splash-hero-mobile-750.webp 750w, AssetsGIS/splash-hero-mobile-1080.webp 1080w"
      imagesizes="100vw"
      media="(max-width: 767px)">

<!-- Warm the connection to the icon CDN; region cards each request one PNG from here. -->
<link rel="preconnect" href="https://tiles.mapmagician.in" crossorigin>

<style>
:root {
  --brand: #008577;
  --brand-dark: #006e63;
  --bg: #f3f5f6;
  --card: #ffffff;
  --text: #1f2933;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.05);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: var(--text);
  background: #c5d5d2;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

/* ============ HERO: full-viewport fixed background ============
   Sits behind everything so the menu floats on top and the image
   covers 100vw x 100vh at any aspect ratio. Pointer events stay
   enabled so a tap/drag anywhere outside the menu opens the map. */
.hero {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #c5d5d2;
  cursor: pointer;
  overflow: hidden;
  touch-action: manipulation;
}
.hero picture, .hero img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}
.hero img {
  object-fit: cover;
  object-position: center;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none; /* clicks bubble to .hero */
}
.hero-gradient {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 160px;
  background: linear-gradient(to top, rgba(0,0,0,.35), transparent);
  pointer-events: none;
}

/* ============ PANEL: floats on top of hero (left col on desktop, top strip on mobile) ============ */
.panel {
  position: fixed;
  top: 0; left: 0;
  width: 360px;
  height: 100vh;
  z-index: 2;
  display: flex;
  flex-direction: column;
  background: var(--card);
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 18px rgba(0,0,0,.08);
  transition: transform 280ms cubic-bezier(.4,0,.2,1), opacity 220ms ease-out;
  will-change: transform;
}
.panel.closing {
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}
.panel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 8px;
}
.panel-back {
  width: 32px; height: 32px;
  border: none; background: transparent;
  font-size: 20px; color: var(--brand-dark);
  cursor: pointer; border-radius: 8px;
  display: none; align-items: center; justify-content: center;
  transition: background 120ms;
}
.panel-back:hover { background: #eef6f4; }
.panel-back.visible { display: flex; }
.panel-logo {
  display: flex; align-items: center; gap: 10px;
  flex: 1; min-width: 0;
}
.panel-logo img { width: 28px; height: 28px; }
.panel-title {
  font-size: 16px; font-weight: 700; margin: 0;
  letter-spacing: -.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.panel-search {
  margin: 6px 16px 10px;
  padding: 10px 14px;
  background: #f3f5f6;
  border: 1px solid transparent;
  border-radius: 10px;
  font: inherit;
  outline: none;
  transition: background 120ms, border-color 120ms;
}
.panel-search:focus {
  background: #fff;
  border-color: var(--brand);
}
.grid {
  flex: 1 1 0;
  min-height: 0; /* let the flex item shrink so overflow-y:auto actually scrolls */
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 14px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-content: start;
  align-items: start; /* prevent cards from stretching to fill auto-row height */
  -webkit-overflow-scrolling: touch;
}
.grid.grid-list {
  /* Village level: one row per village, full-width inside the panel. */
  grid-template-columns: 1fr;
  gap: 6px;
}

/* State / district cards: silhouette on white + centered name (mirrors maps.html
   .region-card). Explicit pixel heights on the image area guarantee the card
   never compresses, regardless of grid stretching or aspect-ratio support. */
.card {
  background: #fff;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  transition: transform 120ms, box-shadow 120ms, border-color 120ms;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.card:active { transform: scale(.97); }
.card-img {
  width: 100%;
  height: 110px;            /* explicit px height — works without aspect-ratio support */
  object-fit: contain;
  display: block;
  background: #fff;
  padding: 8px;
  flex: 0 0 110px;
}
.card-ph {
  width: 100%;
  height: 110px;
  flex: 0 0 110px;
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f5;
  font-size: 36px; font-weight: 800; color: #B0BEC5;
}
.card-body {
  padding: 6px 8px 10px;
  text-align: center;
  flex: 1 1 auto;
}
.card-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-sub {
  font-size: 10px; color: #999;
  margin-top: 2px;
}

/* Village rows: flat list, no silhouette — mirrors maps.html village rendering
   (line 4820-4828): letter chip on the left, name + coords on the right. */
.row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: #fff;
  border: 1px solid #eee;
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 120ms, background 120ms;
}
.row:hover { border-color: #d1d5db; background: #fafafa; }
.row:active { background: #f3f4f6; }
.row-letter {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: #e8f5e9;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #2E7D32;
  flex-shrink: 0;
}
.row-text { flex: 1; min-width: 0; }
.row-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.row-sub {
  font-size: 10px; color: #999;
  margin-top: 2px;
}

.skel {
  background: #eef0f1;
  border-radius: 10px;
  height: 150px; /* matches a real card's height */
  position: relative;
  overflow: hidden;
}
.skel::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent);
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
.empty {
  grid-column: 1 / -1;
  padding: 40px 12px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

.panel-footer {
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  background: #fff;
  flex-shrink: 0;
}
.panel-footer a {
  color: var(--brand-dark);
  text-decoration: none;
  font-weight: 600;
}
.panel-footer a:hover { text-decoration: underline; }

/* ============ OPEN MAP button: fixed, centered over the visible hero region ============ */
.open-map {
  position: fixed;
  bottom: calc(28px + env(safe-area-inset-bottom));
  /* Desktop default: center over the right portion of the viewport (hero area
     visible past the 360px panel). Recalculated for mobile below. */
  left: calc(50% + 180px);
  transform: translateX(-50%);
  z-index: 3;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 28px;
  border: none;
  border-radius: 999px;
  background: var(--brand);
  color: #fff;
  font: 600 16px/1 inherit;
  letter-spacing: .01em;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(0,133,119,.45), 0 2px 4px rgba(0,0,0,.18);
  transition: transform 120ms, background 120ms, opacity 200ms;
  white-space: nowrap;
}
.open-map:hover { background: var(--brand-dark); transform: translateX(-50%) translateY(-1px); }
.open-map:active { transform: translateX(-50%) translateY(0); }
.open-map .arrow {
  display: inline-block;
  transition: transform 160ms;
}
.open-map:hover .arrow { transform: translateX(3px); }

/* ============ MOBILE LAYOUT (same left-column shape as desktop, just narrower) ============
   Per design: keep the panel as a left rail even on phones. Width drops to ~38vw
   (clamped 150-220px) and the grid stays vertical (single column) with shrunk
   icons. Hero fills the rest of the screen on the right and remains full-bleed
   behind the panel.                                                              */
@media (max-width: 767px) {
  .panel {
    width: clamp(150px, 38vw, 220px);
    /* keep top:0 / bottom:0 inset from base rule; same left rail as desktop */
  }
  .grid {
    grid-template-columns: 1fr; /* single column inside the narrow rail */
    padding: 4px 8px 12px;
    gap: 8px;
  }
  .card { /* keep vertical card shape (image on top, name below) — just smaller */ }
  .card-img, .card-ph { height: 130px; flex: 0 0 130px; padding: 6px; }
  .card-body { padding: 5px 6px 8px; }
  .card-name { font-size: 12px; }
  .card-sub { font-size: 10px; }
  .row { padding: 9px 10px; gap: 10px; }
  .row-letter { width: 32px; height: 32px; font-size: 13px; }
  .row-name { font-size: 12px; }
  .row-sub { font-size: 9px; }
  .skel { height: 170px; }
  .panel-header { padding: 12px 10px 6px; }
  .panel-logo img { width: 22px; height: 22px; }
  .panel-title { font-size: 14px; }
  .panel-search {
    margin: 4px 10px 8px;
    padding: 8px 12px;
    font-size: 13px;
  }
  .panel-footer { padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); font-size: 10px; }
  .open-map {
    /* Center over the visible hero strip (right of the panel). Panel width is
       clamped between 150 and 220px; using the same calc form as desktop with
       a smaller offset keeps the button visually centered on phones. */
    /* Center over the hero strip to the right of the panel. The clamp tracks
       the panel width exactly: half of clamp(150, 38vw, 220) -> clamp(75, 19vw, 110). */
    left: calc(50% + clamp(75px, 19vw, 110px));
    bottom: calc(20px + env(safe-area-inset-bottom));
    padding: 12px 22px;
    font-size: 14px;
  }
}
</style>
</head>
<body>

<!-- Hero is BEHIND everything; clicks anywhere outside the panel/button open the map. -->
<div class="hero" id="hero" role="button" aria-label="Open the interactive map">
  <picture>
    <source media="(max-width: 767px)" type="image/webp"
            srcset="AssetsGIS/splash-hero-mobile-390.webp 390w, AssetsGIS/splash-hero-mobile-750.webp 750w, AssetsGIS/splash-hero-mobile-1080.webp 1080w"
            sizes="100vw">
    <source media="(max-width: 767px)" type="image/jpeg"
            srcset="AssetsGIS/splash-hero-mobile-390.jpg 390w, AssetsGIS/splash-hero-mobile-750.jpg 750w, AssetsGIS/splash-hero-mobile-1080.jpg 1080w"
            sizes="100vw">
    <source media="(min-width: 768px)" type="image/webp"
            srcset="AssetsGIS/splash-hero-desktop-768.webp 768w, AssetsGIS/splash-hero-desktop-1280.webp 1280w, AssetsGIS/splash-hero-desktop-1920.webp 1920w"
            sizes="100vw">
    <source media="(min-width: 768px)" type="image/jpeg"
            srcset="AssetsGIS/splash-hero-desktop-768.jpg 768w, AssetsGIS/splash-hero-desktop-1280.jpg 1280w, AssetsGIS/splash-hero-desktop-1920.jpg 1920w"
            sizes="100vw">
    <img src="AssetsGIS/splash-hero-desktop-1280.jpg" alt="Live Development Plan map preview" decoding="async" fetchpriority="high">
  </picture>
  <div class="hero-gradient"></div>
</div>

<aside class="panel" id="panel">
  <div class="panel-header">
    <button class="panel-back" id="back" aria-label="Back" type="button">&larr;</button>
    <div class="panel-logo">
      <img src="AssetsGIS/mapmagiciansmall.png" alt="" width="28" height="28">
      <h1 class="panel-title" id="title">Browse Regions</h1>
    </div>
  </div>
  <input class="panel-search" id="search" type="search" placeholder="Search states or districts..." autocomplete="off" enterkeyhint="search">
  <div class="grid" id="grid">
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
  </div>
  <footer class="panel-footer">
    Powered by <a href="https://www.mapmagician.in/" rel="noopener">MapMagician</a>
  </footer>
</aside>

<button class="open-map" id="open-map" type="button">
  Open Map <span class="arrow" aria-hidden="true">&rarr;</span>
</button>

<script>
(function () {
  'use strict';

  var MENU_URL = 'https://sodium-hour-256110.firebaseio.com/menuGIS.json';
  var ICON_BASE = 'https://tiles.mapmagician.in/dpplans/0imagesGIS/';
  var MAP_URL = '/maps.html';

  var $ = function (id) { return document.getElementById(id); };
  var panel = $('panel'), grid = $('grid'), title = $('title'),
      back = $('back'), search = $('search'),
      hero = $('hero'), openBtn = $('open-map');

  // Animate panel off-screen, then navigate. 280ms matches the CSS transition
  // so the slide completes before the new page replaces this one.
  var navigating = false;
  function goToMap(extraQuery) {
    if (navigating) return;
    navigating = true;
    panel.classList.add('closing');
    openBtn.style.opacity = '0';
    var url = MAP_URL + (extraQuery ? '?' + extraQuery : '');
    setTimeout(function () { window.location.href = url; }, 280);
  }

  // Hero interactions: real tap, OR drag past a small threshold.
  // pointerdown alone would fire on scroll-start; we wait for pointerup (tap)
  // or genuine pointermove. pointercancel clears intent.
  var pdown = null;
  hero.addEventListener('pointerdown', function (e) {
    pdown = { x: e.clientX, y: e.clientY, fired: false };
  });
  hero.addEventListener('pointermove', function (e) {
    if (!pdown || pdown.fired) return;
    var dx = e.clientX - pdown.x, dy = e.clientY - pdown.y;
    if (dx * dx + dy * dy > 100) { // ~10px
      pdown.fired = true;
      goToMap();
    }
  });
  hero.addEventListener('pointerup', function () {
    if (pdown && !pdown.fired) goToMap();
    pdown = null;
  });
  hero.addEventListener('pointercancel', function () { pdown = null; });

  openBtn.addEventListener('click', function (e) { e.stopPropagation(); goToMap(); });

  // Region browser: full 3-level drill — state -> district -> village. Mirrors
  // maps.html's openRegionsBrowser/openStateInBrowser/openDistrictVillages so
  // every entry visible there is also visible here.
  var data = null;
  var byState = null;       // { stateName: [entry, ...] }, insertion-ordered
  var stateOrder = null;    // [stateName, ...] in first-seen order (matches maps.html)
  // historyStack lets the Back button rewind state -> district -> village.
  var historyStack = []; // [{ level, title, items, parent? }]

  function countVillages(villagesJSON) {
    if (!villagesJSON) return 0;
    var c = 0;
    var lines = villagesJSON.split('\n');
    for (var i = 0; i < lines.length; i++) if (lines[i].indexOf('=') > -1) c++;
    return c;
  }

  function parseVillagesJSON(villagesJSON) {
    if (!villagesJSON) return [];
    var out = [];
    villagesJSON.split('\n').forEach(function (line) {
      var eq = line.indexOf('=');
      if (eq <= 0) return;
      var name = line.substring(0, eq).trim();
      var coords = line.substring(eq + 1).trim().split(',');
      var lat = parseFloat(coords[0]);
      var lng = parseFloat(coords[1]);
      if (!name || isNaN(lat) || isNaN(lng)) return;
      out.push({ name: name, lat: lat, lng: lng });
    });
    return out;
  }

  function fetchMenu() {
    fetch(MENU_URL, { cache: 'force-cache' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (json) {
        if (!json) return showEmpty('Could not load regions. Tap Open Map to continue.');
        data = json;
        byState = {};
        stateOrder = [];
        for (var k in json) {
          var e = json[k]; if (!e || !e.state) continue;
          var copy = { _key: k };
          for (var f in e) copy[f] = e[f];
          if (!byState[e.state]) { byState[e.state] = []; stateOrder.push(e.state); }
          byState[e.state].push(copy);
        }
        renderStates();
      })
      .catch(function () { showEmpty('Could not load regions. Tap Open Map to continue.'); });
  }

  function renderStates() {
    historyStack = [];
    var items = stateOrder.map(function (name) {
      var entries = byState[name];
      var districts = entries.filter(function (e) { return e.district; });
      var icon = (entries[0] && entries[0].iconState) || '';
      var sub;
      if (districts.length > 0) {
        sub = districts.length + ' district' + (districts.length === 1 ? '' : 's');
      } else {
        var v = 0;
        entries.forEach(function (e) { v += countVillages(e.villagesJSON); });
        sub = v ? v + ' location' + (v === 1 ? '' : 's') : '';
      }
      return { name: name, sub: sub, icon: icon, _kind: 'state' };
    });
    pushLevel({ level: 'state', title: 'Browse Regions', items: items });
  }

  function openState(stateName) {
    // Match maps.html openStateInBrowser logic exactly. If a state has districts,
    // show district list. If it's a single state-level entry with villages, jump
    // straight to its villages.
    var entries = byState[stateName] || [];
    var districts = entries.filter(function (e) { return e.district; })
      .sort(function (a, b) { return a.district.localeCompare(b.district); });
    var stateItem = entries.find(function (e) { return !e.district; });

    if (districts.length === 1) {
      // Single district — skip a step and jump to its villages.
      openDistrict(districts[0]);
      return;
    }
    if (districts.length > 1) {
      var items = districts.map(function (d) {
        var locCount = countVillages(d.villagesJSON);
        return {
          name: d.district,
          sub: locCount ? locCount + ' location' + (locCount === 1 ? '' : 's') : '',
          icon: d.iconVillage || d.iconState || '',
          _kind: 'district',
          _entry: d
        };
      });
      pushLevel({ level: 'district', title: stateName, items: items });
      return;
    }
    if (stateItem && stateItem.villagesJSON) {
      openDistrict(stateItem, stateName);
    }
  }

  function openDistrict(entry, overrideTitle) {
    var villages = parseVillagesJSON(entry.villagesJSON);
    if (villages.length === 1) {
      // Single village — go straight to map at that lat/lng.
      goToVillage(villages[0], entry.productPurchaseID);
      return;
    }
    var items = villages.map(function (v) {
      return {
        name: v.name,
        sub: v.lat.toFixed(4) + ', ' + v.lng.toFixed(4),
        icon: '', // villages have no icons; placeholder renders the first letter
        _kind: 'village',
        _lat: v.lat,
        _lng: v.lng,
        _pid: entry.productPurchaseID
      };
    });
    pushLevel({ level: 'village', title: overrideTitle || entry.district || entry.state, items: items });
  }

  function pushLevel(level) {
    historyStack.push(level);
    title.textContent = level.title;
    back.classList.toggle('visible', historyStack.length > 1);
    search.value = '';
    paint(level.items, level.level);
    grid.scrollTop = 0;
  }

  function popLevel() {
    if (historyStack.length <= 1) return;
    historyStack.pop();
    var prev = historyStack[historyStack.length - 1];
    title.textContent = prev.title;
    back.classList.toggle('visible', historyStack.length > 1);
    search.value = '';
    paint(prev.items, prev.level);
    grid.scrollTop = 0;
  }

  function paint(items, level) {
    grid.innerHTML = '';
    // Villages render as a flat single-column list (matches maps-app.js:4815).
    // States and districts render as a 2-col silhouette card grid.
    grid.classList.toggle('grid-list', level === 'village');
    if (!items.length) { showEmpty('No matches.'); return; }
    var frag = document.createDocumentFragment();
    items.forEach(function (item) {
      var c;
      if (level === 'village') {
        c = renderRow(item);
      } else {
        c = renderCard(item);
      }
      c.addEventListener('click', function () { onCardClick(item); });
      frag.appendChild(c);
    });
    grid.appendChild(frag);
  }

  function renderCard(item) {
    var c = document.createElement('div');
    c.className = 'card';
    var firstChar = (item.name.charAt(0) || '?');
    if (item.icon) {
      var img = document.createElement('img');
      img.className = 'card-img';
      img.loading = 'lazy';
      img.decoding = 'async';
      img.alt = '';
      img.src = ICON_BASE + item.icon + '.png';
      img.onerror = function () {
        var ph = document.createElement('div');
        ph.className = 'card-ph';
        ph.textContent = firstChar;
        this.parentNode.replaceChild(ph, this);
      };
      c.appendChild(img);
    } else {
      var ph = document.createElement('div');
      ph.className = 'card-ph';
      ph.textContent = firstChar;
      c.appendChild(ph);
    }
    var body = document.createElement('div');
    body.className = 'card-body';
    var nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = item.name;
    body.appendChild(nameEl);
    if (item.sub) {
      var subEl = document.createElement('div');
      subEl.className = 'card-sub';
      subEl.textContent = item.sub;
      body.appendChild(subEl);
    }
    c.appendChild(body);
    return c;
  }

  function renderRow(item) {
    var r = document.createElement('div');
    r.className = 'row';
    var letter = document.createElement('div');
    letter.className = 'row-letter';
    letter.textContent = (item.name.charAt(0) || '?');
    var txt = document.createElement('div');
    txt.className = 'row-text';
    var nameEl = document.createElement('div');
    nameEl.className = 'row-name';
    nameEl.textContent = item.name;
    txt.appendChild(nameEl);
    if (item.sub) {
      var subEl = document.createElement('div');
      subEl.className = 'row-sub';
      subEl.textContent = item.sub;
      txt.appendChild(subEl);
    }
    r.appendChild(letter);
    r.appendChild(txt);
    return r;
  }

  function onCardClick(item) {
    if (item._kind === 'state') { openState(item.name); return; }
    if (item._kind === 'district') { openDistrict(item._entry); return; }
    if (item._kind === 'village') { goToVillage({ lat: item._lat, lng: item._lng, name: item.name }, item._pid); return; }
  }

  function goToVillage(v, productPurchaseID) {
    // maps-app.js:3877 honors ?lat&lng&zoom for deep-linking.
    var qs = 'lat=' + v.lat + '&lng=' + v.lng + '&zoom=15';
    if (productPurchaseID) qs += '&pid=' + encodeURIComponent(productPurchaseID);
    goToMap(qs);
  }

  function showEmpty(msg) {
    grid.innerHTML = '';
    var d = document.createElement('div');
    d.className = 'empty';
    d.textContent = msg;
    grid.appendChild(d);
  }

  back.addEventListener('click', popLevel);

  var searchDebounce;
  search.addEventListener('input', function () {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function () {
      var q = search.value.trim().toLowerCase();
      var current = historyStack[historyStack.length - 1];
      if (!current) return;
      if (!q) { paint(current.items, current.level); return; }
      paint(current.items.filter(function (it) { return it.name.toLowerCase().indexOf(q) > -1; }), current.level);
    }, 80);
  });

  // Warm the browser cache for /maps.html so the eventual navigation is
  // near-instant. Idle-scheduled so it never competes with splash paint.
  function prefetchMap() {
    [MAP_URL, '/maps-app.js'].forEach(function (href) {
      var l = document.createElement('link');
      l.rel = 'prefetch';
      l.href = href;
      l.as = href.endsWith('.js') ? 'script' : 'document';
      document.head.appendChild(l);
    });
  }
  (window.requestIdleCallback || function (cb) { return setTimeout(cb, 800); })(prefetchMap, { timeout: 1500 });

  requestAnimationFrame(function () { setTimeout(fetchMenu, 0); });
})();
</script>
</body>
</html>
