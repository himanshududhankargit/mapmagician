<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#008577">
<title>Map Magician — Development Plan Maps for India</title>
<meta name="description" content="Browse Development Plan, Town Planning Scheme and Village maps across India. 7-day passes for high-zoom premium tiles per district.">
<link rel="canonical" href="https://dpplans.com/">
<link rel="icon" href="AssetsGIS/mapmagiciansmall.png">
<link rel="apple-touch-icon" href="AssetsGIS/mapmagiciansmall.png">

<!-- Preload the hero variant the browser will most likely use, so it races the
     initial HTML parse instead of waiting for layout. media= keeps mobile from
     wasting bytes on the desktop variant and vice versa. -->
<link rel="preload" as="image" type="image/webp"
      href="AssetsGIS/splash-hero-desktop-1280.webp"
      imagesrcset="AssetsGIS/splash-hero-desktop-768.webp 768w, AssetsGIS/splash-hero-desktop-1280.webp 1280w, AssetsGIS/splash-hero-desktop-1920.webp 1920w"
      imagesizes="(min-width: 768px) calc(100vw - 360px), 0px"
      media="(min-width: 768px)">
<link rel="preload" as="image" type="image/webp"
      href="AssetsGIS/splash-hero-mobile-750.webp"
      imagesrcset="AssetsGIS/splash-hero-mobile-390.webp 390w, AssetsGIS/splash-hero-mobile-750.webp 750w, AssetsGIS/splash-hero-mobile-1080.webp 1080w"
      imagesizes="(max-width: 767px) 100vw, 0px"
      media="(max-width: 767px)">

<!-- Warm the connection to the icon CDN; region cards each request one PNG from here. -->
<link rel="preconnect" href="https://tiles.mapmagician.in" crossorigin>

<style>
:root {
  --brand: #008577;
  --brand-dark: #006e63;
  --bg: #f3f5f6;
  --card: #ffffff;
  --text: #1f2933;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.05);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
.app {
  display: flex;
  height: 100%;
  width: 100%;
}

/* ============ PANEL (left on desktop, top on mobile) ============ */
.panel {
  flex: 0 0 360px;
  display: flex;
  flex-direction: column;
  background: var(--card);
  border-right: 1px solid var(--border);
  position: relative;
  z-index: 2;
  transition: transform 280ms cubic-bezier(.4,0,.2,1), opacity 220ms ease-out;
  will-change: transform;
}
.panel.closing {
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}
.panel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 8px;
}
.panel-back {
  width: 32px; height: 32px;
  border: none; background: transparent;
  font-size: 20px; color: var(--brand-dark);
  cursor: pointer; border-radius: 8px;
  display: none; align-items: center; justify-content: center;
  transition: background 120ms;
}
.panel-back:hover { background: #eef6f4; }
.panel-back.visible { display: flex; }
.panel-logo {
  display: flex; align-items: center; gap: 10px;
  flex: 1; min-width: 0;
}
.panel-logo img { width: 28px; height: 28px; }
.panel-title {
  font-size: 16px; font-weight: 700; margin: 0;
  letter-spacing: -.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.panel-search {
  margin: 6px 16px 10px;
  padding: 10px 14px;
  background: #f3f5f6;
  border: 1px solid transparent;
  border-radius: 10px;
  font: inherit;
  outline: none;
  transition: background 120ms, border-color 120ms;
}
.panel-search:focus {
  background: #fff;
  border-color: var(--brand);
}
.grid {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 14px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  align-content: start;
  -webkit-overflow-scrolling: touch;
}
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  display: flex; flex-direction: column;
  min-height: 130px;
  transition: transform 140ms ease-out, box-shadow 140ms ease-out, border-color 140ms;
  box-shadow: var(--shadow);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #d1d5db; }
.card:active { transform: translateY(0); }
.card-img {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
  background: #e8f5f3;
  display: block;
}
.card-ph {
  width: 100%;
  aspect-ratio: 16/10;
  background: linear-gradient(135deg, #e8f5f3, #c9e7e2);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: var(--brand-dark);
}
.card-body {
  padding: 8px 10px 10px;
}
.card-name {
  font-size: 13px; font-weight: 600;
  color: var(--text);
  line-height: 1.25;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-sub {
  font-size: 11px; color: var(--muted);
  margin-top: 2px;
}
.skel {
  background: #eef0f1;
  border-radius: 12px;
  min-height: 130px;
  position: relative;
  overflow: hidden;
}
.skel::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent);
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
.empty {
  grid-column: 1 / -1;
  padding: 40px 12px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

/* ============ HERO (right on desktop, bottom on mobile) ============ */
.hero {
  flex: 1;
  position: relative;
  background: #c5d5d2;
  overflow: hidden;
  cursor: pointer;
  display: flex; flex-direction: column;
  touch-action: manipulation;
}
.hero-img {
  flex: 1;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
.hero-gradient {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 140px;
  background: linear-gradient(to top, rgba(0,0,0,.45), transparent);
  pointer-events: none;
}
.open-map {
  position: absolute;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%);
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 28px;
  border: none;
  border-radius: 999px;
  background: var(--brand);
  color: #fff;
  font: 600 16px/1 inherit;
  letter-spacing: .01em;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(0,133,119,.45), 0 2px 4px rgba(0,0,0,.15);
  transition: transform 120ms, background 120ms, box-shadow 120ms, opacity 200ms;
  white-space: nowrap;
}
.open-map:hover { background: var(--brand-dark); transform: translateX(-50%) translateY(-1px); }
.open-map:active { transform: translateX(-50%) translateY(0); }
.open-map .arrow {
  display: inline-block;
  transition: transform 160ms;
}
.open-map:hover .arrow { transform: translateX(3px); }

/* ============ MOBILE LAYOUT (stacked, panel on top) ============ */
@media (max-width: 767px) {
  .app { flex-direction: column; }
  .panel {
    flex: 0 0 35vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
    width: 100%;
  }
  .panel.closing {
    /* Slide LEFT on mobile too — keeps the gesture consistent across breakpoints. */
    transform: translateX(-100%);
  }
  .grid {
    /* Single column on mobile so all region names stay scannable. */
    grid-template-columns: 1fr;
    padding: 4px 14px 16px;
  }
  .card {
    flex-direction: row;
    align-items: center;
    min-height: 0;
  }
  .card-img, .card-ph {
    width: 64px;
    aspect-ratio: 1/1;
    flex: 0 0 64px;
  }
  .card-body {
    flex: 1;
    padding: 10px 12px;
  }
  .skel { min-height: 64px; }
  .hero { flex: 1; min-height: 0; }
  .open-map {
    bottom: 20px;
    padding: 13px 24px;
    font-size: 15px;
  }
}
</style>
</head>
<body>

<div class="app" id="app">

  <aside class="panel" id="panel">
    <div class="panel-header">
      <button class="panel-back" id="back" aria-label="Back" type="button">&larr;</button>
      <div class="panel-logo">
        <img src="AssetsGIS/mapmagiciansmall.png" alt="" width="28" height="28">
        <h1 class="panel-title" id="title">Browse Regions</h1>
      </div>
    </div>
    <input class="panel-search" id="search" type="search" placeholder="Search states or districts..." autocomplete="off" enterkeyhint="search">
    <div class="grid" id="grid">
      <!-- Skeleton cards: visible until menuGIS arrives. -->
      <div class="skel"></div><div class="skel"></div>
      <div class="skel"></div><div class="skel"></div>
      <div class="skel"></div><div class="skel"></div>
      <div class="skel"></div><div class="skel"></div>
    </div>
  </aside>

  <main class="hero" id="hero" role="button" aria-label="Open the interactive map">
    <picture>
      <source media="(max-width: 767px)" type="image/webp"
              srcset="AssetsGIS/splash-hero-mobile-390.webp 390w, AssetsGIS/splash-hero-mobile-750.webp 750w, AssetsGIS/splash-hero-mobile-1080.webp 1080w"
              sizes="100vw">
      <source media="(max-width: 767px)" type="image/jpeg"
              srcset="AssetsGIS/splash-hero-mobile-390.jpg 390w, AssetsGIS/splash-hero-mobile-750.jpg 750w, AssetsGIS/splash-hero-mobile-1080.jpg 1080w"
              sizes="100vw">
      <source media="(min-width: 768px)" type="image/webp"
              srcset="AssetsGIS/splash-hero-desktop-768.webp 768w, AssetsGIS/splash-hero-desktop-1280.webp 1280w, AssetsGIS/splash-hero-desktop-1920.webp 1920w"
              sizes="calc(100vw - 360px)">
      <source media="(min-width: 768px)" type="image/jpeg"
              srcset="AssetsGIS/splash-hero-desktop-768.jpg 768w, AssetsGIS/splash-hero-desktop-1280.jpg 1280w, AssetsGIS/splash-hero-desktop-1920.jpg 1920w"
              sizes="calc(100vw - 360px)">
      <img class="hero-img" src="AssetsGIS/splash-hero-desktop-1280.jpg" alt="Live Development Plan map preview" width="1280" height="676" decoding="async" fetchpriority="high">
    </picture>
    <div class="hero-gradient"></div>
    <button class="open-map" id="open-map" type="button">
      Open Map <span class="arrow" aria-hidden="true">&rarr;</span>
    </button>
  </main>

</div>

<script>
(function () {
  'use strict';

  var MENU_URL = 'https://sodium-hour-256110.firebaseio.com/menuGIS.json';
  var ICON_BASE = 'https://tiles.mapmagician.in/dpplans/0imagesGIS/';
  var MAP_URL = '/maps.html';

  var $ = function (id) { return document.getElementById(id); };
  var panel = $('panel'), grid = $('grid'), title = $('title'),
      back = $('back'), search = $('search'),
      hero = $('hero'), openBtn = $('open-map');

  // Animate panel off-screen, then navigate. Same handler for hero tap, drag,
  // and Open Map button. 280ms matches the CSS transition so the slide
  // completes before the new page replaces this one.
  var navigating = false;
  function goToMap(extraQuery) {
    if (navigating) return;
    navigating = true;
    panel.classList.add('closing');
    openBtn.style.opacity = '0';
    openBtn.style.transform = 'translateX(-50%) translateY(8px)';
    var url = MAP_URL + (extraQuery ? '?' + extraQuery : '');
    setTimeout(function () { window.location.href = url; }, 280);
  }

  // Hero interactions: real tap, OR drag past a small threshold.
  // pointerdown alone would fire on scroll-start; we wait for pointerup (tap)
  // or genuine pointermove. pointercancel clears intent (browser took over).
  var pdown = null;
  hero.addEventListener('pointerdown', function (e) {
    pdown = { x: e.clientX, y: e.clientY, fired: false };
  });
  hero.addEventListener('pointermove', function (e) {
    if (!pdown || pdown.fired) return;
    var dx = e.clientX - pdown.x, dy = e.clientY - pdown.y;
    if (dx * dx + dy * dy > 100) { // ~10px
      pdown.fired = true;
      goToMap();
    }
  });
  hero.addEventListener('pointerup', function () {
    if (pdown && !pdown.fired) goToMap();
    pdown = null;
  });
  hero.addEventListener('pointercancel', function () { pdown = null; });

  openBtn.addEventListener('click', function (e) { e.stopPropagation(); goToMap(); });
  openBtn.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
  openBtn.addEventListener('pointerup', function (e) { e.stopPropagation(); });

  // Region browser: state -> district. Villages are deliberately left to
  // maps.html, where the user already has the full map UX.
  var data = null;
  var byState = null;
  var view = { level: 'state', state: null, items: [] };

  function fetchMenu() {
    fetch(MENU_URL, { cache: 'force-cache' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (json) {
        if (!json) return showEmpty('Could not load regions. Tap Open Map to continue.');
        data = json;
        byState = {};
        for (var k in json) {
          var e = json[k]; if (!e || !e.state) continue;
          var copy = { _key: k };
          for (var f in e) copy[f] = e[f];
          (byState[e.state] = byState[e.state] || []).push(copy);
        }
        renderStates();
      })
      .catch(function () { showEmpty('Could not load regions. Tap Open Map to continue.'); });
  }

  function renderStates() {
    view.level = 'state'; view.state = null;
    var states = Object.keys(byState).sort();
    view.items = states.map(function (name) {
      var entries = byState[name];
      var districts = entries.filter(function (e) { return e.district; });
      var icon = (entries[0] && entries[0].iconState) || '';
      var sub;
      if (districts.length > 0) {
        sub = districts.length + ' district' + (districts.length === 1 ? '' : 's');
      } else {
        var v = 0;
        entries.forEach(function (e) {
          if (e.villagesJSON) v += e.villagesJSON.split('\n').filter(function (l) { return l.indexOf('=') > -1; }).length;
        });
        sub = v ? v + ' location' + (v === 1 ? '' : 's') : '';
      }
      return { name: name, sub: sub, icon: icon, _hasDistricts: districts.length > 0, _entry: entries[0] };
    });
    title.textContent = 'Browse Regions';
    back.classList.remove('visible');
    search.value = '';
    paint(view.items);
  }

  function renderDistricts(stateName) {
    view.level = 'district'; view.state = stateName;
    var districts = (byState[stateName] || []).filter(function (e) { return e.district; });
    districts.sort(function (a, b) { return a.district.localeCompare(b.district); });
    view.items = districts.map(function (d) {
      var locCount = 0;
      if (d.villagesJSON) locCount = d.villagesJSON.split('\n').filter(function (l) { return l.indexOf('=') > -1; }).length;
      return {
        name: d.district,
        sub: locCount ? locCount + ' location' + (locCount === 1 ? '' : 's') : '',
        icon: d.iconVillage || d.iconState || '',
        _entry: d
      };
    });
    title.textContent = stateName;
    back.classList.add('visible');
    search.value = '';
    paint(view.items);
    grid.scrollTop = 0;
  }

  function paint(items) {
    grid.innerHTML = '';
    if (!items.length) { showEmpty('No matches.'); return; }
    var frag = document.createDocumentFragment();
    items.forEach(function (item) {
      var c = document.createElement('div');
      c.className = 'card';
      var firstChar = (item.name.charAt(0) || '?');
      if (item.icon) {
        var img = document.createElement('img');
        img.className = 'card-img';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.alt = '';
        img.src = ICON_BASE + item.icon + '.png';
        img.onerror = function () {
          var ph = document.createElement('div');
          ph.className = 'card-ph';
          ph.textContent = firstChar;
          this.parentNode.replaceChild(ph, this);
        };
        c.appendChild(img);
      } else {
        var ph = document.createElement('div');
        ph.className = 'card-ph';
        ph.textContent = firstChar;
        c.appendChild(ph);
      }
      var body = document.createElement('div');
      body.className = 'card-body';
      var nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = item.name;
      body.appendChild(nameEl);
      if (item.sub) {
        var subEl = document.createElement('div');
        subEl.className = 'card-sub';
        subEl.textContent = item.sub;
        body.appendChild(subEl);
      }
      c.appendChild(body);
      c.addEventListener('click', function () { onCardClick(item); });
      frag.appendChild(c);
    });
    grid.appendChild(frag);
  }

  function onCardClick(item) {
    if (view.level === 'state' && item._hasDistricts) {
      renderDistricts(item.name);
      return;
    }
    // Leaf click: navigate to maps.html with hints. maps.html can wire these
    // params later to focus the right district; today they're harmless.
    var pid = item._entry && item._entry.productPurchaseID;
    var name = item._entry && (item._entry.district || item._entry.state);
    var qs = [];
    if (pid) qs.push('pid=' + encodeURIComponent(pid));
    if (name) qs.push('region=' + encodeURIComponent(name));
    goToMap(qs.join('&'));
  }

  function showEmpty(msg) {
    grid.innerHTML = '';
    var d = document.createElement('div');
    d.className = 'empty';
    d.textContent = msg;
    grid.appendChild(d);
  }

  back.addEventListener('click', renderStates);

  // Search filters the current level. Substring match, case-insensitive.
  var searchDebounce;
  search.addEventListener('input', function () {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function () {
      var q = search.value.trim().toLowerCase();
      if (!q) { paint(view.items); return; }
      paint(view.items.filter(function (it) { return it.name.toLowerCase().indexOf(q) > -1; }));
    }, 80);
  });

  // Warm the browser cache for /maps.html so the eventual navigation is
  // near-instant. Idle-scheduled so it never competes with splash paint.
  function prefetchMap() {
    [MAP_URL, '/maps-app.js'].forEach(function (href) {
      var l = document.createElement('link');
      l.rel = 'prefetch';
      l.href = href;
      l.as = href.endsWith('.js') ? 'script' : 'document';
      document.head.appendChild(l);
    });
  }
  (window.requestIdleCallback || function (cb) { return setTimeout(cb, 800); })(prefetchMap, { timeout: 1500 });

  // Kick off menu fetch right after first paint so the skeleton is visible
  // for a single frame before data lands.
  requestAnimationFrame(function () { setTimeout(fetchMenu, 0); });
})();
</script>
</body>
</html>
