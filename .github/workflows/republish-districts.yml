name: Republish districts

# Fires when the Android admin app pushes d1.bin / d3.bin updates. Regenerates
# tileFolderMap.json + cloudfront-gate.js in the GIS web repo and redeploys
# both Firebase (getCloudFrontCookies) and CloudFront (mmp-tile-gate).
#
# Required repo secrets (configure in Settings → Secrets and variables → Actions):
#   GIS_WEB_PAT        fine-grained PAT with contents:write on the GIS web repo
#   FIREBASE_SA_KEY    service-account JSON with Cloud Functions Admin on sodium-hour-256110
#   AWS_ACCESS_KEY_ID  IAM user scoped to cloudfront:DescribeFunction/UpdateFunction/PublishFunction
#   AWS_SECRET_ACCESS_KEY
#   NOTIFY_GMAIL_USER  Gmail address for sending notifications (same one can live in Firebase as SUPPORT_GMAIL_USER)
#   NOTIFY_GMAIL_PASS  Gmail 16-char app password (NOT the account password)
#
# Required repo variable (Settings → Variables → Actions):
#   GIS_WEB_REPO       "<owner>/<gis-web-repo>" — the repo that holds functions/

on:
  push:
    branches: [main]
    paths:
      - 'data/database/d1.bin'
      - 'data/database/d3.bin'
  workflow_dispatch:

concurrency:
  group: republish-districts
  cancel-in-progress: false

jobs:
  republish:
    runs-on: ubuntu-latest
    steps:
      # gis-web and mapmagician-main must sit as siblings inside the same parent,
      # because generateTileFolderMap.js:21 resolves d1.bin/d3.bin via
      # path.resolve(__dirname, "..", "mapmagician-main", ...). Mirror the local
      # C:/MyData/GIS web/ layout by nesting mapmagician-main inside the gis-web
      # checkout so ../mapmagician-main resolves correctly from functions/.
      - name: Checkout GIS web
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GIS_WEB_REPO }}
          token: ${{ secrets.GIS_WEB_PAT }}
          path: gis-web

      - name: Checkout mapmagician-main (inside gis-web)
        uses: actions/checkout@v4
        with:
          path: gis-web/mapmagician-main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: gis-web/functions/package-lock.json

      - name: Install functions deps
        working-directory: gis-web/functions
        run: npm ci

      - name: Regenerate tileFolderMap + patch cloudfront-gate
        id: regen
        working-directory: gis-web/functions
        # Generator reads ../mapmagician-main/data/database/{d1,d3}.bin;
        # our layout above puts both checkouts as siblings so the relative
        # path the generator expects resolves correctly.
        # Capture stdout so the notification email can include the summary.
        run: |
          node generateTileFolderMap.js | tee regen.log
          {
            echo "summary<<__EOF__"
            cat regen.log
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Commit regenerated files back to GIS web
        id: commit
        working-directory: gis-web
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — tileFolderMap + cloudfront-gate already up-to-date"
            exit 0
          fi
          git config user.name  mmp-bot
          git config user.email mmp-bot@users.noreply.github.com
          git add functions/tileFolderMap.json functions/cloudfront-gate.js
          git commit -m "chore: republish districts [skip ci]

          Triggered by mapmagician-main@${{ github.sha }}"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: CloudFront deploy
        if: steps.commit.outputs.changed == 'true'
        working-directory: gis-web/functions
        run: bash scripts/publish-cloudfront.sh

      # Skip when regenerate was a no-op — identical tileFolderMap.json means
      # getCloudFrontCookies would redeploy byte-identical code. Saves ~2 min.
      - name: Firebase deploy
        if: steps.commit.outputs.changed == 'true'
        working-directory: gis-web
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SA_KEY }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools deploy --only functions:getCloudFrontCookies \
            --project sodium-hour-256110 --non-interactive

      - name: Notify — success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_PASS }}
          from: Map Magician CI <${{ secrets.NOTIFY_GMAIL_USER }}>
          to: himanshududhankar@gmail.com
          subject: "[mmp] Districts republished — ${{ github.event.head_commit.message && github.event.head_commit.id || github.sha }}"
          body: |
            Republish succeeded.

            Trigger: ${{ github.event_name }} on ${{ github.ref_name }}
            Commit (mapmagician-main): ${{ github.sha }}
            Gis-web files changed: ${{ steps.commit.outputs.changed }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Generator summary:
            ${{ steps.regen.outputs.summary }}

      - name: Notify — failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_PASS }}
          from: Map Magician CI <${{ secrets.NOTIFY_GMAIL_USER }}>
          to: himanshududhankar@gmail.com
          subject: "[mmp] Districts republish FAILED — ${{ github.sha }}"
          body: |
            Republish FAILED.

            Trigger: ${{ github.event_name }} on ${{ github.ref_name }}
            Commit (mapmagician-main): ${{ github.sha }}
            Run (has full log): ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Generator summary (if it ran):
            ${{ steps.regen.outputs.summary }}
