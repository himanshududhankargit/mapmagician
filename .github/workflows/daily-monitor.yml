name: Daily site monitor

# Free, subscription-independent watchdog for www.mapmagician.in.
# On failure GitHub emails the workflow's last committer by default; if the
# GMAIL_USERNAME / GMAIL_APP_PASSWORD repo secrets are set, it additionally
# sends the full report by email.

on:
  schedule:
    - cron: '0 3 * * *'   # 08:30 IST daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run site checks
        run: bash .github/scripts/daily-monitor.sh

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report
          path: monitor-report.txt
          if-no-files-found: ignore

      - name: Check mail secrets
        id: mailcfg
        if: failure()
        env:
          U: ${{ secrets.GMAIL_USERNAME }}
          P: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -n "$U" ] && [ -n "$P" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "SMTP secrets not set - relying on GitHub's default failed-run notification."
          fi

      - name: Send failure email
        if: failure() && steps.mailcfg.outputs.ok == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: '[MMP Monitor] site check FAILED'
          to: himanshududhankar@gmail.com
          from: Map Magician Monitor <${{ secrets.GMAIL_USERNAME }}>
          body: file://monitor-report.txt
